name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Engine + backend + web — the fast feedback loop.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --- Engine + backend (root project) ---
      - name: Install (root)
        run: npm ci
      - name: Typecheck (engine + backend)
        run: npm run typecheck
      - name: Test (engine + backend)
        run: npm test

      # --- Frontend ---
      - name: Install (frontend)
        run: npm ci
        working-directory: frontend
      - name: Typecheck (frontend)
        run: npx tsc --noEmit
        working-directory: frontend

  # Mobile app — heavier (RN/Expo), so it runs in parallel. `npm ci` runs the
  # postinstall that links the shared engine/backend into node_modules.
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install (mobile) + link shared core
        run: npm ci
        working-directory: apps/mobile
      - name: Typecheck (mobile)
        run: npx tsc --noEmit
        working-directory: apps/mobile
